<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="referrer" content="no-referrer">
    
    <title>名片載入中...</title>
    
    <base href="/id-card/">
    
    <link rel="icon" href="./logo-米色背.png" type="image/png">
    <link rel="apple-touch-icon" href="./logo-米色背.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        /* 基礎版面設定：解鎖 Y 軸，允許滑動 */
        html, body {
            width: 100%; min-height: 100dvh; margin: 0; padding: 0;
            background-color: #ffffff; -webkit-text-size-adjust: 100%; 
            overflow-x: hidden; overflow-y: auto; 
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex; 
            justify-content: flex-start; 
            align-items: flex-start; 
            font-size: 1em;
            padding-bottom: 50px; 
        }

        /* 頂部區域 */
        .top-header {
            position: fixed; top: 0; left: 0; width: 100%;
            height: calc(60px + env(safe-area-inset-top)); padding-top: env(safe-area-inset-top);
            background-color: #ffffff; z-index: 1000;
            box-shadow: none; 
            transition: background-color 0.4s ease, box-shadow 0.4s ease; box-sizing: border-box;
        }
        .top-header.scrolled {
            background-color: #1a1a1a; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
        .header-logo {
            position: absolute; top: calc(8px + env(safe-area-inset-top)); left: 15px;
            height: 40px; width: 40px; object-fit: contain; 
        }

        /* 名片內容容器 */
        .card-container {
            width: 100%; max-width: 420px; 
            margin-top: calc(100px + env(safe-area-inset-top)); 
            
            /* 🌟 電腦版專用：左右自動計算邊距，讓整個名片容器「完美置中」，而內部文字依然靠左 */
            margin-left: auto; 
            margin-right: auto;
            
            padding: 0 25px;
            box-sizing: border-box; display: none; 
            flex-direction: column; justify-content: flex-start;
        }

        /* 讀取中畫面 */
        #loading-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #666; font-size: 18px; font-weight: bold;
            margin-top: 40vh; 
            width: 100%; 
        }

        /* 照片與文字樣式 (電腦版/大螢幕基準) */
        img.profile {
            display: block; margin: 0 0 15px 0; width: 90px; height: 90px;
            border-radius: 50%; object-fit: cover; border: 3px solid #f0f0f0;
        }
        .name { font-size: 24px; font-weight: bold; margin-bottom: 6px; color: #222; text-align: left; }
        .title { font-size: 16px; color: #333; margin-bottom: 2px; text-align: left; font-weight: 500;}
        .tax-id { font-size: 14px; color: #666; margin-bottom: 20px; text-align: left; }

        /* 聯絡資訊列表 (電腦版/大螢幕基準) */
        .item { display: flex; align-items: center; margin: 8px 0; width: 100%; }
        .fa-icon, .material-icons {
            width: 32px; height: 32px; display: inline-flex; justify-content: center; align-items: center;
            border: 1px solid #f0f0f0; border-radius: 50%; margin-right: 15px; font-size: 16px;
            background-color: #ffffff; flex-shrink: 0; 
        }
        
        /* 專屬圖示顏色設定 */
        .fa-line { color: #00c300; }
        .icon-email { color: #ea4335; }
        .icon-mobile { color: #333; }
        .icon-phone { color: #34a853; }
        .icon-fax { color: #555; }
        .icon-map { color: #ea4335; }
        .icon-website { color: #0066cc; }

        a, .text-black { color: #0066cc; text-decoration: none; font-size: 16px; word-break: break-word; }
        .text-black { color: #333; }
        a:hover { text-decoration: underline; color: #004c99; }

        /* ========================================================= */
        /* 📱 手機瀏覽狀態偵測：維持霸氣比例，向上收緊空間露出版面 */
        /* ========================================================= */
        @media (max-width: 768px) {
            .hide-on-mobile { display: none !important; }
            
            .card-container { 
                padding: 0 30px; 
                margin-top: calc(70px + env(safe-area-inset-top)); 
                /* 🌟 手機版依然維持 auto 即可，因為螢幕寬度通常小於 420px，會自然填滿並置中 */
                margin-left: auto; 
                margin-right: auto;
            }
            
            img.profile { width: 110px; height: 110px; margin-bottom: 12px; }
            .name { font-size: 32px; margin-bottom: 4px; }
            .title { font-size: 18px; margin-bottom: 2px; }
            .tax-id { font-size: 16px; margin-bottom: 15px; } 

            .item { margin: 12px 0; overflow: hidden; } 
            .fa-icon, .material-icons { 
                width: 42px; height: 42px; font-size: 20px; margin-right: 18px; 
            }
            a, .text-black { font-size: 20px; }

            #data-email {
                white-space: nowrap; 
                overflow: hidden;
                text-overflow: ellipsis;
                display: block; 
            }
        }

        /* 超短螢幕安全對策 (針對 iPhone SE 等極限短螢幕，進一步上提) */
        @media (max-height: 700px) {
            .card-container { margin-top: calc(65px + env(safe-area-inset-top)); padding: 0 25px; margin-left: auto; margin-right: auto; }
            img.profile { width: 95px; height: 95px; margin-bottom: 10px; }
            .name { font-size: 28px; margin-bottom: 4px; }
            .title { font-size: 16px; }
            .tax-id { font-size: 15px; margin-bottom: 12px; }
            .item { margin: 8px 0; overflow: hidden; }
            .fa-icon, .material-icons { width: 38px; height: 38px; font-size: 18px; margin-right: 15px; }
            a, .text-black { font-size: 18px; }
            
            #data-email {
                white-space: nowrap; 
                overflow: hidden;
                text-overflow: ellipsis;
                display: block;
            }
        }
    </style>
</head>

<body>

    <div class="top-header" id="main-header">
        <img src="./logo-群組-管理部.png" alt="茶月Logo" class="header-logo" onerror="this.src=''">
    </div>

    <div id="loading-screen">
        <i class="fas fa-spinner fa-spin" style="font-size: 30px; margin-bottom: 15px; color: #3498db;"></i>
        <div>正在雲端核對資料...</div>
    </div>

    <div class="card-container" id="main-card">
        
        <img src="" class="profile" id="data-photo" alt="員工照片" style="display: none;">
        
        <div class="name" id="data-name"></div>
        
        <div class="title">茶月食品有限公司</div>
        <div class="tax-id">統編：24406873</div>
        
        <div class="item" id="box-line">
            <i class="fab fa-line fa-icon"></i>
            <a href="#" target="_blank" id="data-line"></a>
        </div>
        
        <div class="item" id="box-email">
            <i class="fab fa-google fa-icon icon-email"></i>
            <a href="#" id="data-email"></a>
        </div>
        
        <div class="item" id="box-mobile">
            <i class="fas fa-mobile-alt fa-icon icon-mobile"></i>
            <a href="#" id="data-mobile"></a>
        </div>

        <div class="item">
            <i class="fas fa-phone fa-icon icon-phone"></i>
            <a href="tel:+88652761512">+886-5-2761512</a>
        </div>
        
        <div class="item hide-on-mobile">
            <i class="fas fa-fax fa-icon icon-fax"></i>
            <a href="fax:+88652760519">+886-5-2760519</a>
        </div>
        
        <div class="item hide-on-mobile">
            <i class="fas fa-map-marker-alt fa-icon icon-map"></i>
            <a href="https://maps.google.com/?q=嘉義市東區保順路327號" target="_blank">嘉義市東區保順路 327 號</a>
        </div>
        
        <div class="item hide-on-mobile">
            <i class="material-icons icon-website">language</i>
            <a href="https://ochatsuki.com.tw" target="_blank">ochatsuki.com.tw</a>
        </div>

    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQDhshinnw0lMer-KZg0k8XB9duzINgDAIW3zieKuxNIv6kTvC6ACa1qDruDp41MDcRC8DEfh6j_qs8/pub?output=csv";

        window.addEventListener('scroll', function() {
            const header = document.getElementById('main-header');
            if (window.scrollY > 10) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        function parseCSV(text) {
            const rows = []; let currentRow = []; let currentCell = ''; let insideQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i], nextChar = text[i+1];
                if (char === '"' && insideQuotes && nextChar === '"') { currentCell += '"'; i++; } 
                else if (char === '"') { insideQuotes = !insideQuotes; } 
                else if (char === ',' && !insideQuotes) { currentRow.push(currentCell); currentCell = ''; } 
                else if ((char === '\n' || char === '\r') && !insideQuotes) {
                    if (char === '\r' && nextChar === '\n') i++;
                    currentRow.push(currentCell); rows.push(currentRow); currentRow = []; currentCell = '';
                } 
                else { currentCell += char; }
            }
            if (currentCell !== '' || currentRow.length > 0) { currentRow.push(currentCell); rows.push(currentRow); }
            return rows;
        }

        async function fetchAndRenderCard() {
            const urlParams = new URLSearchParams(window.location.search);
            let targetId = urlParams.get('id');

            if (!targetId) {
                const pathParts = window.location.pathname.split('/').filter(p => p && !p.endsWith('.html'));
                if (pathParts.length > 0) {
                    targetId = pathParts[pathParts.length - 1];
                }
            }

            if (!targetId) {
                document.getElementById('loading-screen').innerHTML = '<h2>⚠️ 網址缺少員工 ID 參數</h2><p>請使用類似 ?id=Kris_Lin 的網址</p>';
                return;
            }

            const searchId = targetId.replace(/_/g, ' ');

            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                if (rows.length < 2) throw new Error("資料庫為空");

                const headers = rows[0].map(h => h.trim());
                let foundData = null;

                for (let i = 1; i < rows.length; i++) {
                    const rowObj = {};
                    headers.forEach((header, index) => {
                        rowObj[header] = rows[i][index] ? rows[i][index].trim() : '';
                    });

                    if (rowObj['英文ID'] === searchId) {
                        foundData = rowObj;
                        break;
                    }
                }

                if (foundData) {
                    if (foundData['照片連結']) {
                        const photoEl = document.getElementById('data-photo');
                        photoEl.src = foundData['照片連結'];
                        photoEl.style.display = 'block';
                    }

                    const fullName = foundData['姓名'] || '';
                    document.title = searchId; 
                    document.getElementById('data-name').innerText = `${searchId} ${fullName}`.trim();

                    function fillItem(boxId, textId, textVal, hrefVal) {
                        if (textVal) {
                            const linkEl = document.getElementById(textId);
                            linkEl.innerText = textVal;
                            linkEl.href = hrefVal;
                        } else {
                            document.getElementById(boxId).style.display = 'none'; 
                        }
                    }

                    let rawMobile = foundData['手機'] || '';
                    let cleanMobile = rawMobile.replace(/\D/g, ''); 
                    let displayMobile = rawMobile; 
                    let linkMobile = cleanMobile;  

                    if (cleanMobile.startsWith('09') && cleanMobile.length === 10) {
                        displayMobile = `+886-${cleanMobile.substring(1)}`;
                        linkMobile = `+886${cleanMobile.substring(1)}`;
                    } else if (cleanMobile.startsWith('8869')) {
                        displayMobile = `+886-${cleanMobile.substring(3)}`;
                        linkMobile = `+${cleanMobile}`;
                    }

                    fillItem('box-line', 'data-line', foundData['Line ID'], foundData['LINE行動條碼連結']);
                    fillItem('box-email', 'data-email', foundData['信箱'], `mailto:${foundData['信箱']}`);
                    
                    if (rawMobile) {
                        fillItem('box-mobile', 'data-mobile', displayMobile, `tel:${linkMobile}`);
                    } else {
                        document.getElementById('box-mobile').style.display = 'none';
                    }

                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('main-card').style.display = 'flex';

                } else {
                    document.getElementById('loading-screen').innerHTML = `<h2>⚠️ 查無此人</h2><p>找不到 ID 為 [${searchId}] 的資料</p>`;
                }

            } catch (error) {
                console.error("讀取錯誤：", error);
                document.getElementById('loading-screen').innerHTML = '<h2>🚨 連線失敗</h2><p>無法讀取 Google 雲端資料庫</p>';
            }
        }

        fetchAndRenderCard();
    </script>
</body>
</html>
